<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🧠 QuizMania</h1>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Challenge Your Knowledge</h2>
    <p class="subtitle">Play quizzes across multiple categories and test your skills</p>

    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="startQuiz()">Start Quiz</button>
</section>

<!-- CATEGORY -->
<section class="category" id="categorySection">
    <h2>📚 Choose Category</h2>
    <button onclick="selectCategory('science')">🔬 Science</button>
    <button onclick="selectCategory('math')">📐 Mathematics</button>
    <button onclick="selectCategory('gk')">🌍 General Knowledge</button>
</section>

<!-- QUIZ -->
<section class="quiz" id="quizSection">
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="feedback"></p>
    <button onclick="nextQuestion()">Next ➡️</button>
</section>

<!-- SCORE -->
<section class="score" id="scoreSection">
    <h2>🎉 Quiz Completed!</h2>
    <p id="result"></p>
    <p id="performance"></p>
    <button onclick="restartQuiz()">🔄 Play Again</button>
</section>

<footer>
    <p>© 2026 QuizMania | Developed by Sakhana</p>
</footer>

<script src="script.js"></script>
</body>
</html>
